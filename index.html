<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcard Quiz — Software Engineering</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column; align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff; padding: 24px 16px 60px;
    }
    h1 { font-size: 1.6rem; color: #e2b96f; letter-spacing: 1px; margin-bottom: 4px; text-align: center; }
    .subtitle { font-size: 0.82rem; color: #94a3b8; margin-bottom: 20px; }

    /* Filter */
    .filter-wrap { width: 100%; max-width: 740px; margin-bottom: 18px; }
    .filter-wrap label { display: block; font-size: 0.72rem; color: #94a3b8; margin-bottom: 5px; letter-spacing: 1px; text-transform: uppercase; }
    .filter-row { display: flex; gap: 10px; flex-wrap: wrap; }
    select { flex: 1; min-width: 200px; background: rgba(255,255,255,0.07); color: #fff; border: 1px solid rgba(255,255,255,0.18); border-radius: 10px; padding: 10px 14px; font-size: 0.88rem; cursor: pointer; outline: none; }
    select option { background: #16213e; }
    .btn-load { padding: 10px 22px; background: linear-gradient(135deg, #e2b96f, #f472b6); color: #1a1a2e; border: none; border-radius: 10px; font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: all .2s; }
    .btn-load:hover { transform: translateY(-2px); box-shadow: 0 8px 18px rgba(226,185,111,.35); }

    /* Stats */
    .stats { width: 100%; max-width: 740px; display: flex; gap: 10px; margin-bottom: 14px; }
    .stat { flex: 1; background: rgba(255,255,255,0.06); border-radius: 10px; padding: 8px; display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .stat-val { font-size: 1.25rem; font-weight: 700; }
    .stat-lbl { font-size: 0.72rem; color: #94a3b8; }
    .stat.s-correct .stat-val { color: #4ade80; }
    .stat.s-wrong   .stat-val { color: #f87171; }
    .stat.s-remain  .stat-val { color: #e2b96f; }

    /* Progress */
    .progress-wrap { width: 100%; max-width: 740px; margin-bottom: 6px; }
    .progress-bar-bg { height: 5px; background: rgba(255,255,255,0.08); border-radius: 999px; }
    .progress-bar { height: 5px; background: linear-gradient(90deg,#e2b96f,#f472b6); border-radius: 999px; transition: width .4s; }
    .progress-text { font-size: 0.78rem; color: #94a3b8; text-align: center; margin-bottom: 18px; }

    /* Card */
    .card { width: 100%; max-width: 740px; background: linear-gradient(145deg,#1e3a5f,#16305a); border: 1px solid rgba(226,185,111,0.25); border-radius: 20px; padding: 30px 36px 26px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); margin-bottom: 22px; }
    .card-chapter { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: #e2b96f; opacity: 0.75; margin-bottom: 8px; }
    .card-qnum { font-size: 0.78rem; color: #94a3b8; margin-bottom: 10px; }
    .card-question { font-size: 1.05rem; font-weight: 700; color: #f1f5f9; line-height: 1.55; margin-bottom: 20px; }

    /* Options */
    .options { display: flex; flex-direction: column; gap: 9px; }
    .option {
      display: flex; align-items: flex-start; gap: 12px;
      background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 12px 16px;
      font-size: 0.9rem; color: #cbd5e1; line-height: 1.45;
      cursor: pointer; transition: all .18s; user-select: none;
    }
    .option:hover:not(.disabled) { background: rgba(255,255,255,0.1); border-color: rgba(226,185,111,0.4); color: #fff; }
    .option.disabled { cursor: not-allowed; }
    .option-key { min-width: 26px; height: 26px; border-radius: 50%; background: rgba(255,255,255,0.1); color: #e2b96f; font-weight: 700; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .18s; }

    .option.correct { background: rgba(34,197,94,0.15); border-color: #4ade80; color: #bbf7d0; }
    .option.correct .option-key { background: #4ade80; color: #14532d; }
    .option.wrong   { background: rgba(239,68,68,0.15);  border-color: #f87171; color: #fecaca; }
    .option.wrong   .option-key { background: #f87171; color: #7f1d1d; }

    /* Feedback */
    .feedback { display: none; margin-top: 16px; border-radius: 12px; padding: 12px 18px; font-weight: 700; font-size: 0.9rem; align-items: center; gap: 8px; }
    .feedback.show { display: flex; }
    .feedback.ok  { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.35); color: #4ade80; }
    .feedback.err { background: rgba(239,68,68,0.12);  border: 1px solid rgba(239,68,68,0.35);  color: #f87171; }

    /* Simple (answer-only) */
    .card.simple { text-align: center; }
    .simple-qnum { font-size: 2rem; font-weight: 700; color: #f1f5f9; margin: 8px 0 4px; }
    .simple-note { font-size: 0.78rem; color: rgba(255,255,255,0.3); margin-bottom: 16px; }
    .simple-ans { display: none; margin-top: 12px; }
    .simple-ans.show { display: block; }
    .ans-circle { display: inline-flex; align-items: center; justify-content: center; width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg,#e2b96f,#f472b6); color: #1a1a2e; font-size: 2rem; font-weight: 900; }
    .btn-reveal { margin-top: 14px; padding: 11px 32px; border-radius: 12px; border: none; cursor: pointer; background: linear-gradient(135deg,#e2b96f,#f472b6); color: #1a1a2e; font-weight: 700; font-size: 0.9rem; transition: all .2s; }
    .btn-reveal:hover { transform: translateY(-2px); }
    .btn-reveal:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* Nav */
    .nav-row { display: flex; gap: 12px; align-items: center; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
    button { cursor: pointer; transition: all .2s; }
    .btn-nav { padding: 11px 26px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08); color: #fff; font-size: 0.9rem; font-weight: 600; }
    .btn-nav:hover:not(:disabled) { background: rgba(255,255,255,0.18); transform: translateY(-2px); }
    .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }
    .bottom-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .btn-sm { padding: 9px 16px; border-radius: 10px; font-size: 0.78rem; font-weight: 600; background: rgba(255,255,255,0.06); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); }
    .btn-sm:hover { background: rgba(255,255,255,0.14); color: #fff; }
  </style>
</head>
<body>

<h1>Software Engineering Flashcards</h1>
<p class="subtitle">Chọn đáp án · ← → chuyển câu · R = Xáo trộn</p>

<div class="filter-wrap">
  <label>Chọn Chapter</label>
  <div class="filter-row">
    <select id="chapterSelect">
      <option value="all">Tất cả (20 chapters)</option>
      <option value="0">Chapter 1: Introduction</option>
      <option value="1">Chapter 2: Overview of the UML Notation</option>
      <option value="2">Chapter 3: Software Life Cycle Models and Processes</option>
      <option value="3">Chapter 4: Software Design and Architecture Concepts</option>
      <option value="4">Chapter 5: Overview of Software Modeling and Design Method</option>
      <option value="5">Chapter 6: Use Case Modeling</option>
      <option value="6">Chapter 7: Static Modeling</option>
      <option value="7">Chapter 8: Object and Class Structuring</option>
      <option value="8">Chapter 9: Dynamic Interaction Modeling</option>
      <option value="9">Chapter 10: Finite State Machines</option>
      <option value="10">Chapter 11: State-Dependent Dynamic Interaction Modeling</option>
      <option value="11">Chapter 12: Overview of Software Architecture</option>
      <option value="12">Chapter 13: Software Subsystem Architectural Design</option>
      <option value="13">Chapter 14: Designing Object-Oriented Software Architectures</option>
      <option value="14">Chapter 15: Designing Client/Server Software Architectures</option>
      <option value="15">Chapter 16: Designing Service-Oriented Architectures</option>
      <option value="16">Chapter 17: Designing Component-Based Software Architectures</option>
      <option value="17">Chapter 18: Designing Concurrent and Real-Time Software Architectures</option>
      <option value="18">Chapter 19: Designing Software Product Line Architectures</option>
      <option value="19">Chapter 20: Software Quality Attributes</option>
    </select>
    <button class="btn-load" onclick="loadChapter()">Tải câu hỏi</button>
  </div>
</div>

<div class="stats">
  <div class="stat s-correct"><span class="stat-val" id="sCorrect">0</span><span class="stat-lbl">Đúng</span></div>
  <div class="stat s-wrong">  <span class="stat-val" id="sWrong">0</span>  <span class="stat-lbl">Sai</span></div>
  <div class="stat s-remain"> <span class="stat-val" id="sRemain">0</span> <span class="stat-lbl">Còn lại</span></div>
</div>

<div class="progress-wrap">
  <div class="progress-bar-bg"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
</div>
<p class="progress-text" id="progressText">Câu 0 / 0</p>

<div class="card" id="card"></div>

<div class="nav-row">
  <button class="btn-nav" id="btnPrev" onclick="changeCard(-1)">&#8592; Trước</button>
  <button class="btn-nav" id="btnNext" onclick="changeCard(1)">Tiếp &#8594;</button>
</div>
<div class="bottom-btns">
  <button class="btn-sm" onclick="shuffleCards()">⇌ Xáo trộn</button>
  <button class="btn-sm" onclick="showOnlyWrong()">✗ Chỉ câu sai</button>
  <button class="btn-sm" onclick="resetAll()">↺ Làm lại</button>
</div>

<script>
const CHAPTERS = [
  // ── Chapter 1 ──
  { name:"Chapter 1: Introduction", questions:[
    {q:"What is software modeling?",a:"Developing models of software.",b:"Designing software applications before coding.",c:"Developing software diagrams.",d:"Developing software prototypes.",answer:"b"},
    {q:"What is the Unified Modeling Language?",a:"A programming language for describing object-oriented models.",b:"A diagramming tool for drawing object-oriented models.",c:"A graphical language for describing object-oriented models.",d:"A standardized graphical language and notation for describing object-oriented models.",answer:"d"},
    {q:"What is a software architecture?",a:"The software inside a building.",b:"The structure of a client/server system.",c:"The overall structure of a software system.",d:"The software classes and their relationships.",answer:"c"},
    {q:"What is a software design notation?",a:"Notes about the software design.",b:"A graphical or textual description of the software.",c:"Documentation of the software.",d:"A systematic approach for producing a design.",answer:"b"},
    {q:"What is a software design concept?",a:"A graphical or textual description of the software.",b:"Documentation of the software.",c:"A fundamental idea that can be applied to designing a system.",d:"A systematic approach for producing a design.",answer:"c"},
    {q:"What is a software design strategy?",a:"A graphical or textual description of the software.",b:"A fundamental idea that can be applied to designing a system.",c:"A systematic approach for producing a design.",d:"An overall plan and direction for developing a design.",answer:"d"},
    {q:"What are software structuring criteria?",a:"Fundamental ideas that can be applied to designing a system.",b:"Systematic approaches for producing a design.",c:"Guidelines used to help in structuring a software system into its components.",d:"Overall plans for developing a design.",answer:"c"},
    {q:"What is a software design method?",a:"A systematic approach for producing a design.",b:"Guidelines used to help in structuring a software system into its components.",c:"An overall plan for developing a design.",d:"A graphical or textual description of the software.",answer:"a"},
    {q:"What is a platform-independent model (PIM)?",a:"A software platform before a commitment is made to a specific hardware platform.",b:"A precise model of the software architecture before a commitment is made to a specific platform.",c:"A precise model of the software architecture mapped to a specific platform.",d:"A graphical or textual description of the software.",answer:"b"},
    {q:"What is a platform-specific model (PSM)?",a:"A specific hardware platform.",b:"A precise model of the software architecture before a commitment is made to a specific platform.",c:"A precise model of the software architecture mapped to a specific platform.",d:"A graphical or textual description of the software.",answer:"c"}
  ]},
  // ── Chapter 2 ──
  { name:"Chapter 2: Overview of the UML Notation", questions:[
    {q:"How is an actor depicted on a use case diagram?",a:"An oval.",b:"A stick figure.",c:"A box.",d:"A dashed line.",answer:"b"},
    {q:"How is a use case depicted on a use case diagram?",a:"An oval.",b:"A stick figure.",c:"A box.",d:"A dashed line.",answer:"a"},
    {q:"How is a class depicted on a class diagram?",a:"A box with one compartment.",b:"A box with one or two compartments.",c:"A box with one, two, or three compartments.",d:"An oval.",answer:"c"},
    {q:"How is an association depicted on a class diagram?",a:"A solid line joining two class boxes.",b:"A dashed line joining two class boxes.",c:"A diamond touching the upper class box.",d:"An arrowhead touching the upper class box.",answer:"a"},
    {q:"How is public visibility depicted for a class element on a class diagram?",a:"+ sign.",b:"– sign.",c:"# sign.",d:"* sign.",answer:"a"},
    {q:"What are the two kinds of UML interaction diagrams?",a:"Class diagram and sequence diagram.",b:"Sequence diagram and communication diagram.",c:"Class diagram and communication diagram.",d:"Statechart and communication diagram.",answer:"b"},
    {q:"What does an interaction diagram depict?",a:"Objects and links.",b:"Classes and relationships.",c:"Objects and messages.",d:"States and events.",answer:"c"},
    {q:"What does a statechart diagram depict?",a:"Objects and links.",b:"Classes and relationships.",c:"Objects and messages.",d:"States and events.",answer:"d"},
    {q:"What is a UML package?",a:"A box.",b:"A grouping of classes.",c:"A grouping of use cases.",d:"A grouping of model elements.",answer:"d"},
    {q:"What does a deployment diagram depict?",a:"The physical configuration in terms of physical classes and physical connections.",b:"The physical configuration in terms of physical objects and physical connections.",c:"The physical configuration in terms of physical nodes and physical connections between the nodes.",d:"The physical configuration in terms of physical computers and physical networks.",answer:"c"}
  ]},
  // ── Chapter 3 ──
  { name:"Chapter 3: Software Life Cycle Models and Processes", questions:[
    {q:"What is a software life cycle?",a:"The life of the software.",b:"A cyclic approach to developing software.",c:"A phased approach to developing software.",d:"The life of software developed in cycles.",answer:"c"},
    {q:"What is the waterfall life cycle model?",a:"Software developed under a waterfall.",b:"A process model in which each phase is completed before the next phase is started.",c:"A process model in which phases are overlapped.",d:"A process model in which phases are cyclic.",answer:"b"},
    {q:"Which of the following is a limitation of the waterfall life cycle model?",a:"Software is developed in phases.",b:"Each phase is completed before the next phase is started.",c:"Software development is cyclic.",d:"Software requirements are not properly tested until a working system is available.",answer:"d"},
    {q:"Which of the following approaches can overcome the limitation in the previous question?",a:"Phased software development.",b:"Throwaway prototyping.",c:"Evolutionary prototyping.",d:"Incremental development.",answer:"b"},
    {q:"What is evolutionary prototyping?",a:"Phased software development.",b:"Throwaway prototyping.",c:"Risk-driven development.",d:"Incremental development.",answer:"d"},
    {q:"What approach does the spiral model emphasize?",a:"Phased software development.",b:"Throwaway prototyping.",c:"Risk-driven development.",d:"Incremental development.",answer:"c"},
    {q:"What is the goal of software validation?",a:"Building the system.",b:"Building the right system.",c:"Building the system right.",d:"Testing the system.",answer:"b"},
    {q:"What is the goal of software verification?",a:"Building the system.",b:"Building the right system.",c:"Building the system right.",d:"Testing the system.",answer:"c"},
    {q:"What is \"white box\" testing?",a:"Unit testing.",b:"Integration testing.",c:"Testing with knowledge of the system internals.",d:"Testing without knowledge of the software internals.",answer:"c"},
    {q:"What is \"black box\" testing?",a:"System testing.",b:"Integration testing.",c:"Testing with knowledge of the system internals.",d:"Testing without knowledge of the software internals.",answer:"d"}
  ]},
  // ── Chapter 4 ──
  { name:"Chapter 4: Software Design and Architecture Concepts", questions:[
    {q:"Which of the following are object-oriented concepts?",a:"Modules and interfaces.",b:"Modules and information hiding.",c:"Classes, information hiding, and inheritance.",d:"Concurrency and information hiding.",answer:"c"},
    {q:"Which of the following is a characteristic of an object?",a:"A function or subroutine.",b:"A module.",c:"Groups data and procedures that operate on the data.",d:"Groups a function and an algorithm.",answer:"c"},
    {q:"What is a class?",a:"An object instance.",b:"The implementation of the object.",c:"A collection of objects with the same characteristics.",d:"A collection of objects with different characteristics.",answer:"c"},
    {q:"What is an operation (also known as method) of a class?",a:"Specification and the implementation of a function performed by a class.",b:"Specification and the implementation of a subroutine provided by a class.",c:"Specification and the implementation of a function or procedure provided by a class.",d:"Specification and the implementation of an interface provided by a class.",answer:"c"},
    {q:"What is the signature of an operation?",a:"The operation's name.",b:"The operation's function or subroutine.",c:"The operation's name, parameters, and return value.",d:"The object's interface.",answer:"c"},
    {q:"What is the interface of a class?",a:"The signature of a class.",b:"The specification of operations provided by the class.",c:"The internals of the class.",d:"The implementation of the class.",answer:"b"},
    {q:"What is an attribute?",a:"A description of a class.",b:"An internal property of a class.",c:"A data item held by a class.",d:"A parameter of a class.",answer:"c"},
    {q:"What is information hiding in software design?",a:"Hiding information so that it cannot be found.",b:"Hiding a design decision that is considered likely to change.",c:"Hiding information to make it secure.",d:"Encapsulating data in a class.",answer:"b"},
    {q:"What is data abstraction?",a:"Another name for information hiding.",b:"Encapsulating data so that its structure is hidden.",c:"Storing data in a database.",d:"Storing data in a data structure.",answer:"b"},
    {q:"What is inheritance?",a:"A mechanism for inheriting characteristics from a parent.",b:"A mechanism for sharing and reusing code between classes.",c:"A mechanism for sharing data between classes.",d:"A mechanism for hiding information between classes.",answer:"b"}
  ]},
  // ── Chapter 5 ──
  { name:"Chapter 5: Overview of Software Modeling and Design Method", questions:[
    {q:"What is carried out during requirements modeling?",a:"Functional requirements of the system are described in terms of functions, inputs, and outputs.",b:"Functional requirements of the system are described in terms of actors and use cases.",c:"Functional requirements of the system are described textually.",d:"Functional requirements of the system are determined by interviewing users.",answer:"b"},
    {q:"What is carried out during analysis modeling?",a:"Developing use case models.",b:"Developing data flow and entity-relationship diagrams.",c:"Developing static and dynamic models.",d:"Developing software architectures.",answer:"c"},
    {q:"What is carried out during design modeling?",a:"Developing use case models.",b:"Developing data flow and entity-relationship diagrams.",c:"Developing static and dynamic models.",d:"Developing software architectures.",answer:"d"},
    {q:"What is carried out during incremental software construction?",a:"Detailed design and coding of the classes in a subset of the system.",b:"Detailed design, coding, and unit testing of the classes in a subset of the system.",c:"Coding and unit testing of the classes in a subset of the system.",d:"Unit and integration testing of the classes in a subset of the system.",answer:"b"},
    {q:"What is carried out during incremental software integration?",a:"Implementation of the classes in each software increment.",b:"Unit testing of the classes in each software increment.",c:"Integration testing of the classes in each software increment.",d:"System testing of the classes in each software increment.",answer:"c"},
    {q:"What is carried out during system testing?",a:"White box testing.",b:"Black box testing.",c:"Unit testing.",d:"Integration testing.",answer:"b"}
  ]},
  // ── Chapter 6 ──
  { name:"Chapter 6: Use Case Modeling", questions:[
    {q:"What is a use case?",a:"A case study involving users.",b:"A sequence of interactions between the user and the system.",c:"A sequence of interactions between the user and the objects in the system.",d:"A sequence of user inputs to the system.",answer:"c"},
    {q:"What is an actor in a use case?",a:"An object inside the system.",b:"A person who performs on stage.",c:"An external entity that interacts with the system.",d:"The customer to whom the system will be delivered.",answer:"c"},
    {q:"What is a primary actor?",a:"The actor who goes on stage first.",b:"The actor that starts the use case.",c:"An actor that participates in the use case.",d:"An object inside the system.",answer:"b"},
    {q:"What is a secondary actor?",a:"The actor who goes on stage second.",b:"The actor that starts the use case.",c:"An actor that participates in the use case.",d:"An object inside the system.",answer:"c"},
    {q:"What is an alternative sequence in a use case?",a:"A sequence that describes an error case.",b:"A sequence that is different from the main sequence.",c:"A sequence that describes interactions with a secondary actor.",d:"A sequence that describes interactions with a primary actor.",answer:"b"},
    {q:"What can an inclusion use case be used for?",a:"To describe an inclusive use case.",b:"To describe a lengthy interaction with an actor.",c:"To describe functionality that is common to more than one use case.",d:"To describe a use case that includes other use cases.",answer:"c"},
    {q:"What can an extension use case be used for?",a:"To describe a lengthy interaction with an actor.",b:"To describe functionality that is common to more than one use case.",c:"To describe the functionality of a use case that is extended by another use case(s).",d:"To describe a conditional part of a different use case that is only executed under certain circumstances.",answer:"d"},
    {q:"What can an activity diagram be used for in use case modeling?",a:"To depict the sequence of activities executed by all the use cases in the system.",b:"To depict the sequence of external activities that the use case interacts with.",c:"To depict the sequence of active objects in a use case.",d:"To depict the activities in the main and alternative sequences of a use case.",answer:"d"},
    {q:"How can a nonfunctional requirement be described in a use case model?",a:"In a separate section of the use case description.",b:"As a use case precondition.",c:"As a use case postcondition.",d:"In a separate document.",answer:"a"},
    {q:"What is a use case package?",a:"A package describing the actors in the system.",b:"A package describing the use cases in the system.",c:"A group of related use cases.",d:"The package of objects that participate in the use case.",answer:"c"}
  ]},
  // ── Chapter 7 ──
  { name:"Chapter 7: Static Modeling", questions:[
    {q:"What is a class?",a:"A course.",b:"An object instance.",c:"A client or server in the system.",d:"A collection of objects with the same characteristics.",answer:"d"},
    {q:"What is an attribute?",a:"A relationship between two classes.",b:"A parameter of an operation or method.",c:"A data value held by an object in a class.",d:"The return value from an operation.",answer:"c"},
    {q:"What is an association?",a:"A relationship between two classes.",b:"A relationship between two objects.",c:"A link between two classes.",d:"A link between two objects.",answer:"a"},
    {q:"What is meant by the multiplicity of an association?",a:"The number of associations in a class.",b:"The number of associations between two classes.",c:"How many instances of one class relate to how many instances of another class.",d:"How many instances of one class relate to a single instance of another class.",answer:"d"},
    {q:"What is an association class?",a:"A class with multiple associations.",b:"A class with one association.",c:"A class that models an association between two or more classes.",d:"A class that models an association between two or more objects.",answer:"c"},
    {q:"What is a generalization/specialization hierarchy?",a:"A whole/part relationship.",b:"An inheritance relationship.",c:"An association between a generalized class and a specialized class.",d:"A layered hierarchy.",answer:"b"},
    {q:"What is a composition hierarchy?",a:"A weak form of a generalization/specialization hierarchy.",b:"A strong form of a generalization/specialization hierarchy.",c:"A weak form of a whole/part relationship.",d:"A strong form of a whole/part relationship.",answer:"d"},
    {q:"What is an aggregation hierarchy?",a:"A weak form of a generalization/specialization hierarchy.",b:"A strong form of a generalization/specialization hierarchy.",c:"A weak form of a whole/part relationship.",d:"A strong form of a whole/part relationship.",answer:"c"},
    {q:"What does the system context class diagram define?",a:"The entity classes in the system.",b:"How the system interfaces to other systems.",c:"The boundary between the system and the external environment.",d:"The context classes in the system.",answer:"c"},
    {q:"What is an entity class?",a:"A class on an entity/relationship diagram.",b:"A class that stores data.",c:"A class that interfaces to an external entity.",d:"An external class.",answer:"b"}
  ]},
  // ── Chapter 8 ──
  { name:"Chapter 8: Object and Class Structuring", questions:[
    {q:"What is a boundary object?",a:"An external object.",b:"An object that stores data.",c:"An object that communicates with an external object.",d:"An object that controls other objects.",answer:"c"},
    {q:"What is a control object?",a:"An object that depends on other objects.",b:"An object that communicates with an external object.",c:"An object that controls other objects.",d:"An object that is controlled by other objects.",answer:"c"},
    {q:"What is a state-dependent control object?",a:"An object that depends on a state machine.",b:"An object that communicates with a state machine.",c:"An object that controls a state machine.",d:"An object that executes a state machine.",answer:"d"},
    {q:"What is a coordinator object?",a:"A manager object.",b:"An object that makes decisions based on a state machine.",c:"A decision-making object.",d:"An object that decides which entity object to interact with.",answer:"c"},

    {q:"How are feature conditions used in a SPL state machine?",a:"A guard condition.",b:"A condition that is True or False.",c:"To identify if a feature is selected or not in the state machine.",d:"To allow state machine inheritance.",answer:"c"},
    {q:"What is a kernel system in a SPL?",a:"A member of the SPL only composed of kernel classes.",b:"A member of the SPL composed of kernel classes and possibly some default classes.",c:"A member of the SPL composed of kernel classes and possibly some optional classes.",d:"A member of the SPL composed of kernel classes and possibly some entity classes.",answer:"b"},
    {q:"What does the SPL software architecture describe?",a:"The software inside a family of buildings.",b:"The structure of a client/server product family.",c:"The overall structure of the software product line.",d:"The software product line classes and their relationships.",answer:"c"}
  ]},
  // ── Chapter 20 ──
  { name:"Chapter 20: Software Quality Attributes", questions:[
    {q:"What do software quality attributes address?",a:"Software functional requirements.",b:"Software nonfunctional requirements.",c:"Software performance requirements.",d:"Software availability requirements.",answer:"b"},
    {q:"What is maintainability?",a:"The extent to which software is capable of being changed before deployment.",b:"The extent to which software is capable of being changed after deployment.",c:"The extent to which software is capable of being changed during development.",d:"The extent to which software is capable of being changed after development.",answer:"b"},
    {q:"What is modifiability?",a:"The extent to which software is capable of being modified after deployment.",b:"The extent to which software is capable of being modified after initial development.",c:"The extent to which software is capable of being modified during and after initial development.",d:"The extent to which software is capable of being changed before deployment.",answer:"c"},
    {q:"What is testability?",a:"The extent to which software is capable of being developed.",b:"The extent to which software is capable of being tested before deployment.",c:"The extent to which software is capable of being tested after deployment.",d:"The extent which the software is understood.",answer:"b"},
    {q:"Traceability is the extent to which a product:",a:"Can be traced back to products of previous phases.",b:"Traced back to the requirements.",c:"Traced forward to implementation.",d:"Deployed to a hardware configuration.",answer:"a"},
    {q:"What is scalability?",a:"The extent to which an application can grow.",b:"The extent to which the system is capable of growing after its initial deployment.",c:"The extent to which the system is capable of growing during development.",d:"The extent to which the system is capable of being scaled.",answer:"b"},
    {q:"What is reusability?",a:"The extent to which software implementation is reusable.",b:"The extent to which software is capable of being reused.",c:"The extent to which SPL technology can be introduced.",d:"The extent to which the software is common among a program family.",answer:"b"},
    {q:"Which of the following is not performance-related?",a:"System response time.",b:"System throughput.",c:"System availability.",d:"System capacity.",answer:"c"},
    {q:"Which of the following is not addressed by a secure system?",a:"System penetration.",b:"Denial of service.",c:"System scalability.",d:"System authorization.",answer:"c"},
    {q:"Which of the following system problems does availability address?",a:"Denial of service.",b:"Single point of failure.",c:"System throughput.",d:"System penetration.",answer:"b"}
  ]}
];

function buildCards(indexes) {
  const out = [];
  indexes.forEach(ci => {
    const ch = CHAPTERS[ci];
    if (ch.questions) {
      ch.questions.forEach((q,qi) => out.push({ci, name:ch.name, qNum:qi+1, type:'full', data:q}));
    } else {
      ch.answers.forEach((ans,qi) => out.push({ci, name:ch.name, qNum:qi+1, type:'simple', answer:ans}));
    }
  });
  return out;
}

let allCards = buildCards([...Array(20).keys()]);
let cards    = [...allCards];
let current  = 0;
const answered = {}; // key -> chosen letter | 'revealed'

function cardKey(c) { return `${c.ci}_${c.qNum}`; }

function loadChapter() {
  const val = document.getElementById('chapterSelect').value;
  const idx = val === 'all' ? [...Array(20).keys()] : [parseInt(val)];
  allCards = buildCards(idx); cards = [...allCards]; current = 0; renderCard();
}

function renderCard() {
  if (!cards.length) return;
  const c   = cards[current];
  const key = cardKey(c);
  const ans = answered[key];

  document.getElementById('progressBar').style.width = ((current+1)/cards.length*100)+'%';
  document.getElementById('progressText').textContent = `Câu ${current+1} / ${cards.length}`;
  document.getElementById('btnPrev').disabled = current === 0;
  document.getElementById('btnNext').disabled = current === cards.length-1;
  updateStats();

  const card = document.getElementById('card');

  if (c.type === 'full') {
    const d = c.data;
    const opts = ['a','b','c','d'].map(k => {
      let cls = 'option' + (ans ? ' disabled' : '');
      if (ans) {
        if (k === d.answer)   cls += ' correct';
        else if (k === ans)   cls += ' wrong';
      }
      const click = ans ? '' : `onclick="checkAnswer('${k}')"`;
      return `<div class="${cls}" ${click}><span class="option-key">${k.toUpperCase()}</span><span>${d[k]}</span></div>`;
    }).join('');

    let fb = '';
    if (ans) {
      if (ans === d.answer) fb = `<div class="feedback ok show">✓ Chính xác!</div>`;
      else                  fb = `<div class="feedback err show">✗ Sai! Đáp án đúng là <strong>(${d.answer.toUpperCase()})</strong></div>`;
    }

    card.className = 'card';
    card.innerHTML = `
      <div class="card-chapter">${c.name}</div>
      <div class="card-qnum">Câu ${c.qNum}</div>
      <div class="card-question">${d.q}</div>
      <div class="options">${opts}</div>
      ${fb}`;
  } else {
    card.className = 'card simple';
    card.innerHTML = `
      <div class="card-chapter">${c.name}</div>
      <div class="simple-qnum">Câu ${c.qNum}</div>
      <div class="simple-note">Chưa có nội dung câu hỏi</div>
      ${!ans ? `<button class="btn-reveal" onclick="revealSimple()">Xem đáp án</button>` : ''}
      <div class="simple-ans ${ans ? 'show' : ''}">
        <div class="ans-circle">${c.answer.toUpperCase()}</div>
      </div>`;
  }
}

function checkAnswer(chosen) {
  const c = cards[current];
  if (!c || c.type !== 'full' || answered[cardKey(c)]) return;
  answered[cardKey(c)] = chosen;
  renderCard();
}

function revealSimple() {
  answered[cardKey(cards[current])] = 'revealed';
  renderCard();
}

function changeCard(dir) {
  const n = current + dir;
  if (n < 0 || n >= cards.length) return;
  current = n; renderCard();
}

function shuffleCards() {
  for (let i = cards.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [cards[i],cards[j]] = [cards[j],cards[i]];
  }
  current = 0; renderCard();
}

function showOnlyWrong() {
  const wrong = allCards.filter(c => {
    const a = answered[cardKey(c)];
    return c.type === 'full' && a && a !== c.data.answer;
  });
  if (!wrong.length) { alert('Không có câu nào sai!'); return; }
  cards = wrong; current = 0; renderCard();
}

function resetAll() {
  Object.keys(answered).forEach(k => delete answered[k]);
  cards = [...allCards]; current = 0; renderCard();
}

function updateStats() {
  const full    = allCards.filter(c => c.type === 'full');
  const done    = full.filter(c => answered[cardKey(c)]);
  const correct = done.filter(c => answered[cardKey(c)] === c.data.answer);
  document.getElementById('sCorrect').textContent = correct.length;
  document.getElementById('sWrong').textContent   = done.length - correct.length;
  document.getElementById('sRemain').textContent  = full.length - done.length;
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight')         changeCard(1);
  if (e.key === 'ArrowLeft')          changeCard(-1);
  if (e.key === 'r' || e.key === 'R') shuffleCards();
  if (['a','b','c','d'].includes(e.key)) checkAnswer(e.key);
});

renderCard();
</script>
